    async function loadStudentsFromCSV(showNotification = true) {
      try {
        const response = await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vTqFEcX2Dcpzo4SN1Cu-TCtkrae7qAzjKQ8WF9axNxQdovls_RtSdNdT4BP1C_MHTL1z17iDHfoklMJ/pub?gid=0&single=true&output=csv');
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const csvText = await response.text();
        
        function parseCSVLine(line) {
          const result = [];
          let current = '';
          let inQuotes = false;
          
          for (let i = 0; i < line.length; i++) {
            const char = line[i];
            const nextChar = line[i + 1];
            
            if (char === '"') {
              if (inQuotes && nextChar === '"') {
                current += '"';
                i++;
              } else {
                inQuotes = !inQuotes;
              }
            } else if (char === ',' && !inQuotes) {
              result.push(current.trim());
              current = '';
            } else {
              current += char;
            }
          }
          result.push(current.trim());
          return result;
        }
        
        const lines = csvText.split('\n').filter(line => line.trim());
        const students = [];
        
        for (let i = 1; i < lines.length; i++) {
          const cols = parseCSVLine(lines[i]);
          
          if (cols.length >= 5 && cols[0]) {
            students.push({
              nis: cols[0],
              nama: cols[1],
              kelas: cols[2],
              petugasUKS: cols[3],
              musyrif: cols[4]
            });
          }
        }
        
        studentsData = students;
        
        if (showNotification) {
          const notification = document.createElement('div');
          notification.innerHTML = `
            <div style="position: fixed; top: 20px; right: 20px; background: #10b981; color: white; padding: 16px 24px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 9999;">
              ✓ ${students.length} data siswa berhasil dimuat
            </div>
          `;
          document.body.appendChild(notification);
          setTimeout(() => notification.remove(), 3000);
        }
        
        return students;
      } catch (error) {
        console.error('Error loading students:', error);
        
        if (showNotification) {
          const notification = document.createElement('div');
          notification.innerHTML = `
            <div style="position: fixed; top: 20px; right: 20px; background: #ef4444; color: white; padding: 16px 24px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 9999;">
              ⚠ Gagal memuat data dari spreadsheet
            </div>
          `;
          document.body.appendChild(notification);
          setTimeout(() => notification.remove(), 3000);
        }
        
        studentsData = [];
        return [];
      }
    }

    async function loadLayananFromCSV(showNotification = true) {

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const csvText = await response.text();
        
        function parseCSVLine(line) {
          const result = [];
          let current = '';
          let inQuotes = false;
          
          for (let i = 0; i < line.length; i++) {
            const char = line[i];
            const nextChar = line[i + 1];
            
            if (char === '"') {
              if (inQuotes && nextChar === '"') {
                current += '"';
                i++;
              } else {
                inQuotes = !inQuotes;
              }
            } else if (char === ',' && !inQuotes) {
              result.push(current.trim());
              current = '';
            } else {
              current += char;
            }
          }
          result.push(current.trim());
          return result;
        }
        
        function parseDateToTimestamp(dateStr) {
          if (!dateStr || !dateStr.includes('/')) return Date.now();
          const parts = dateStr.split('/');
          if (parts.length !== 3) return Date.now();
          const day = parseInt(parts[0]);
          const month = parseInt(parts[1]) - 1;
          const year = parseInt(parts[2]);
          return new Date(year, month, day).getTime();
        }
        
        const lines = csvText.split('\n').filter(line => line.trim());
        const layananData = [];
        
        for (let i = 1; i < lines.length; i++) {

    function getFilteredStudents() {
      if (!currentUser) return [];
      
      if (currentUser.peran === "Petugas UKS") {
        const currentUserNameWithoutTitle = currentUser.nama.split(',')[0].trim();
        return studentsData.filter(s => {
          if (!s.petugasUKS) return false;
          const petugasName = s.petugasUKS.split(',')[0].trim();
          return petugasName === currentUserNameWithoutTitle;
        });
      } else if (currentUser.peran === "Musyrif") {
        return studentsData.filter(s => {
          const musyrifValue = s.musyrif ? s.musyrif.trim().toLowerCase() : '';
          return musyrifValue === 'musyrif' || musyrifValue === 'musrif';
        });
      } else if (currentUser.peran === "Musyrifah") {
        return studentsData.filter(s => {
          const musyrifValue = s.musyrif ? s.musyrif.trim().toLowerCase() : '';
          return musyrifValue === 'musyrifah' || musyrifValue === 'musrifah';
        });
      }
      
      return studentsData;
    }

    function getUniqueClasses() {
      const filtered = getFilteredStudents();
      return [...new Set(filtered.map(s => s.kelas))].sort();
    }

    async function handleLogin(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('loginError');
      const loginBtn = document.getElementById('loginBtn');
      
      const user = users.find(u => u.username === username && u.password === password);
      
      if (user) {
        loginBtn.innerHTML = '<span class="loading"></span>';
        loginBtn.disabled = true;
        
        currentUser = user;
        renderMainApp();
        
        // Load data di background setelah login (tanpa notifikasi)
        loadStudentsFromCSV(false);
        loadLayananFromCSV(false);
        loadMCUFromCSV(false);

    function formatDateToDDMMYYYY(dateString) {
      const date = new Date(dateString);
      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const year = date.getFullYear();
      return `${day}/${month}/${year}`;
    }

    async function handleLayananFormSubmit(e) {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.innerHTML = '<span class="loading"></span>';
      submitBtn.disabled = true;
      
      const tanggalInput = document.getElementById('tanggal').value;
      const tanggalFormatted = formatDateToDDMMYYYY(tanggalInput);
      
      const record = {
        type: 'layanan',
        tanggal: tanggalFormatted,
        kelas: document.getElementById('kelas').value,
        nama_siswa: document.getElementById('namaSiswa').value,
        keluhan: document.getElementById('keluhan').value,
        diagnosis: document.getElementById('diagnosis').value,
        tindakan: document.getElementById('tindakan').value,
        petugas: document.getElementById('petugas').value,
        timestamp: Date.now()
      };

      if (allRecords.length >= 999) {
        showNotification('Maksimum 999 catatan tercapai. Silakan hapus beberapa catatan terlebih dahulu.', 'error');
        submitBtn.innerHTML = 'Simpan Catatan';
        submitBtn.disabled = false;
        return;
      }

      const result = await window.dataSdk.create(record);
      
      if (result.isOk) {
        try {
          await fetch('https://script.google.com/macros/s/AKfycbycNOwCOGO05JhttlBF_cD8BQr3pwAbRlpFfxDc6H4aS9lP3FrQuqMk0MpkPbwZ6oko/exec', {
            method: 'POST',
            mode: 'no-cors',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              tanggal: record.tanggal,
              kelas: record.kelas,
              nama_siswa: record.nama_siswa,
              keluhan: record.keluhan,
              diagnosis: record.diagnosis,
              tindakan: record.tindakan,
              petugas: record.petugas
            })
          });
        } catch (error) {
          console.log('Google Sheets sync:', error);
        }
        
        document.getElementById('layananForm').reset();
        document.getElementById('tanggal').valueAsDate = new Date();
        document.getElementById('petugas').value = (currentUser.peran === "Musrif" || currentUser.peran === "Musrifah") ? '' : currentUser.nama;
        showNotification('Catatan layanan berhasil disimpan!', 'success');
      } else {
        showNotification('Gagal menyimpan catatan. Silakan coba lagi.', 'error');
      }
      
      submitBtn.innerHTML = 'Simpan Catatan';
      submitBtn.disabled = false;
    }

    function displayStudents() {
      const studentsList = document.getElementById('studentsList');
      const studentCount = document.getElementById('studentCount');
      if (!studentsList) return;
      
      const filterKelas = document.getElementById('profilFilterKelas')?.value || '';
      const filterNama = document.getElementById('profilFilterNama')?.value.toLowerCase() || '';
      
      let filtered = getFilteredStudents();
      
      if (filterKelas) {
        filtered = filtered.filter(s => s.kelas === filterKelas);
      }
      if (filterNama) {
        filtered = filtered.filter(s => s.nama.toLowerCase().includes(filterNama));
      }
      
      const uniqueStudents = [];
      const seenStudents = new Set();
      
      for (const student of filtered) {
        const key = `${student.kelas}|${student.nama}`;
        if (!seenStudents.has(key)) {
          seenStudents.add(key);
          uniqueStudents.push(student);
        }
      }
      
      if (studentCount) {
        studentCount.textContent = `Menampilkan ${uniqueStudents.length} santri${filterKelas ? ' dari kelas ' + filterKelas : ''}`;
      }
      
      if (uniqueStudents.length === 0) {
        studentsList.innerHTML = `<p class="text-center py-12 text-gray-500 text-lg">Tidak ada data santri yang sesuai filter</p>`;
        return;
      }
      
      const gradients = [
        'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
        'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
        'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
        'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
        'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
        'linear-gradient(135deg, #30cfd0 0%, #330867 100%)',
        'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)',
        'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)',
        'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)',
        'linear-gradient(135deg, #ff6e7f 0%, #bfe9ff 100%)'
      ];
      
      studentsList.innerHTML = uniqueStudents.map((student, index) => {
        // Hanya gunakan data dari spreadsheet
        const layananRecords = layananFromSheet.filter(r => r.nama_siswa === student.nama && r.kelas === student.kelas);
        
        // Hitung MCU dengan deduplikasi yang sama seperti di modal
        const fromSheetMCU = mcuFromSheet.filter(r => {
          const namaSheet = (r.nama_siswa || '').trim().toLowerCase();
          const namaTarget = (student.nama || '').trim().toLowerCase();

    function calculateIMT() {
      const tinggi = parseFloat(document.getElementById('mcuTinggi').value);
      const berat = parseFloat(document.getElementById('mcuBerat').value);
      
      if (tinggi > 0 && berat > 0) {
        const tinggiMeter = tinggi / 100;
        const imt = (berat / (tinggiMeter * tinggiMeter)).toFixed(1);
        document.getElementById('mcuIMT').value = imt;
        
        let kategori = '';
        if (imt < 18.5) kategori = 'Kurus';
        else if (imt >= 18.5 && imt < 25) kategori = 'Normal';
        else if (imt >= 25 && imt < 30) kategori = 'Gemuk';
        else kategori = 'Obesitas';
        
        document.getElementById('mcuKategori').value = kategori;
      }
    }

    async function handleMCUFormSubmit(e, student) {
      e.preventDefault();
      
      const submitBtn = document.getElementById('mcuSubmitBtn');
      submitBtn.innerHTML = '<span class="loading"></span>';
      submitBtn.disabled = true;
      
      const tanggalInput = document.getElementById('mcuTanggal').value;
      const tanggalFormatted = formatDateToDDMMYYYY(tanggalInput);
      
      const record = {
        type: 'mcu',
        tanggal: tanggalFormatted,
        nama_siswa: student.nama,
        kelas: student.kelas,
        petugas: document.getElementById('mcuPetugas').value,
        tinggi_badan: parseFloat(document.getElementById('mcuTinggi').value),
        berat_badan: parseFloat(document.getElementById('mcuBerat').value),
        imt: parseFloat(document.getElementById('mcuIMT').value),
        kategori_gizi: document.getElementById('mcuKategori').value,
        kesehatan_kulit: document.getElementById('mcuKulit').value,
        kesehatan_mata: document.getElementById('mcuMata').value,
        kesehatan_telinga: document.getElementById('mcuTelinga').value,
        kesehatan_gigi: document.getElementById('mcuGigi').value,
        timestamp: Date.now()
      };

      if (allRecords.length >= 999) {
        showNotification('Maksimum 999 catatan tercapai.', 'error');
        submitBtn.innerHTML = 'Simpan Data MCU';
        submitBtn.disabled = false;
        return;
      }

      const result = await window.dataSdk.create(record);
      
      if (result.isOk) {
        try {
          await fetch('https://script.google.com/macros/s/AKfycbymYOvGzsiM9yexRD9b2C4Qyg58LDeqqBALErISqKUzSvGC3tsV6JcLDZHtF9CALzmB/exec', {
            method: 'POST',
            mode: 'no-cors',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              tanggal: record.tanggal,
              nama_siswa: record.nama_siswa,
              kelas: record.kelas,
              petugas: record.petugas,
              tinggi_badan: record.tinggi_badan,
              berat_badan: record.berat_badan,
              imt: record.imt,
              kategori_gizi: record.kategori_gizi,
              kesehatan_kulit: record.kesehatan_kulit,
              kesehatan_mata: record.kesehatan_mata,
              kesehatan_telinga: record.kesehatan_telinga,
              kesehatan_gigi: record.kesehatan_gigi
            })
          });
        } catch (error) {
          console.log('Google Sheets sync:', error);
        }
        
        showNotification('Data MCU berhasil disimpan!', 'success');
        
        // Update modal dengan data terbaru
        setTimeout(() => {
          const kelasNamaKey = `${student.kelas}|${student.nama}`;
          openStudentDetail(kelasNamaKey);
        }, 500);
      } else {
        showNotification('Gagal menyimpan data MCU.', 'error');
      }
      
      submitBtn.innerHTML = 'Simpan Data MCU';
      submitBtn.disabled = false;
    }

    function displayRujukanHistory() {
      const rujukanList = document.getElementById('rujukanList');
      if (!rujukanList) return;
      
      const dariTanggal = document.getElementById('filterRujukanDariTanggal')?.value || '';
      const sampaiTanggal = document.getElementById('filterRujukanSampaiTanggal')?.value || '';
      const filterKelas = document.getElementById('filterRujukanKelas')?.value || '';
      const filterNama = document.getElementById('filterRujukanNama')?.value.toLowerCase() || '';
      
      let allRujukan = [...rujukanFromSheet];
      
      if (dariTanggal) {
        const dariFormatted = formatDateToDDMMYYYY(dariTanggal);
        allRujukan = allRujukan.filter(r => {
          const recordDate = r.tanggal.split('/').reverse().join('');
          const filterDate = dariFormatted.split('/').reverse().join('');
          return recordDate >= filterDate;
        });
      }
      if (sampaiTanggal) {
        const sampaiFormatted = formatDateToDDMMYYYY(sampaiTanggal);
        allRujukan = allRujukan.filter(r => {
          const recordDate = r.tanggal.split('/').reverse().join('');
          const filterDate = sampaiFormatted.split('/').reverse().join('');
          return recordDate <= filterDate;
        });
      }
      if (filterKelas) {
        allRujukan = allRujukan.filter(r => r.kelas === filterKelas);
      }
      if (filterNama) {
        allRujukan = allRujukan.filter(r => r.nama_siswa.toLowerCase().includes(filterNama));
      }
      
      const sortedRujukan = allRujukan.sort((a, b) => b.timestamp - a.timestamp);
      
      if (sortedRujukan.length === 0) {
        rujukanList.innerHTML = `<p class="text-center py-8 text-gray-500">Belum ada riwayat rujukan</p>`;
        return;
      }
      
      rujukanList.innerHTML = `
        <div class="mb-4 p-4 rounded-lg" style="background: rgba(59, 174, 160, 0.1);">
          <p class="text-center font-semibold" style="color: ${config.secondary_color};">
            📊 Menampilkan ${sortedRujukan.length} data rujukan dari ${filterKelas ? 'kelas ' + filterKelas : 'SEMUA kelas'}
          </p>
        </div>
        <table class="w-full">
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Jam</th>
              <th>Kelas</th>
              <th>Nama Santri</th>
              <th>Keluhan</th>
              <th>Tindakan</th>
              <th>Alasan</th>
              <th>Tujuan</th>
              <th>Petugas</th>
            </tr>
          </thead>
          <tbody>
            ${sortedRujukan.map(record => `
              <tr>
                <td>${record.tanggal}</td>
                <td>${record.jam}</td>
                <td>${record.kelas}</td>
                <td>${record.nama_siswa}</td>
                <td>${record.keluhan}</td>
                <td>${record.tindakan}</td>
                <td>${record.alasan}</td>
                <td>${record.tujuan}</td>
                <td>${record.petugas}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function resetRujukanFilters() {
      if (document.getElementById('filterRujukanDariTanggal')) document.getElementById('filterRujukanDariTanggal').value = '';
      if (document.getElementById('filterRujukanSampaiTanggal')) document.getElementById('filterRujukanSampaiTanggal').value = '';

      if (document.getElementById('filterRujukanNama')) document.getElementById('filterRujukanNama').value = '';
      displayRujukanHistory();
    }

    async function generateSuratRujukan() {
      const submitBtn = document.getElementById('rujukanSubmitBtn');
      submitBtn.innerHTML = '<span class="loading"></span>';
      submitBtn.disabled = true;
      
      const kelas = document.getElementById('rujukanKelas').value;

                <th>Berat (kg)</th>
                <th>IMT</th>
                <th>Kategori Gizi</th>
                <th>Kulit</th>
                <th>Mata</th>
                <th>Telinga</th>
                <th>Gigi & Mulut</th>
                <th>Petugas</th>
              </tr>
            </thead>
            <tbody>
              ${sortedMCU.length > 0 ? sortedMCU.map((record, index) => `
                <tr>
                  <td>${index + 1}</td>
                  <td>${record.tanggal}</td>
                  <td>${record.kelas}</td>
                  <td>${record.nama_siswa}</td>
                  <td>${record.tinggi_badan}</td>
                  <td>${record.berat_badan}</td>
                  <td>${record.imt}</td>
                  <td>${record.kategori_gizi}</td>
                  <td>${record.kesehatan_kulit}</td>
                  <td>${record.kesehatan_mata}</td>
                  <td>${record.kesehatan_telinga}</td>
                  <td>${record.kesehatan_gigi}</td>
                  <td>${record.petugas}</td>
                </tr>
              `).join('') : '<tr><td colspan="13" class="text-center py-8 text-gray-500">Tidak ada data</td></tr>'}
            </tbody>
          </table>
        `;
      }
    }

    const dataHandler = {
      onDataChanged(data) {
        allRecords = data;
        
        if (currentMenu === 'layanan') {
          displayRecords();
        } else if (currentMenu === 'mcu') {
          displayStudents();
        } else if (currentMenu === 'laporan') {
          displayStatistics();
        }
      }
    };

    async function onConfigChange(newConfig) {
      config = { ...config, ...newConfig };
      
      const appDiv = document.getElementById('app');
      if (!appDiv) return;
      
      if (!currentUser) {
        renderLoginPage();
      } else {
        renderMainApp();
      }
    }

    async function init() {
      if (window.dataSdk) {
        const initResult = await window.dataSdk.init(dataHandler);
        if (!initResult.isOk) {
          console.error("Failed to initialize data SDK");
        }
      }

      if (window.elementSdk) {
        await window.elementSdk.init({
          defaultConfig,
          onConfigChange,
          mapToCapabilities: (config) => ({
            recolorables: [
              {
                get: () => config.primary_color || defaultConfig.primary_color,
                set: (value) => {
                  config.primary_color = value;
                  window.elementSdk.setConfig({ primary_color: value });
                }
              },
              {
                get: () => config.secondary_color || defaultConfig.secondary_color,
                set: (value) => {
                  config.secondary_color = value;
                  window.elementSdk.setConfig({ secondary_color: value });
                }
              },
              {
                get: () => config.background_color || defaultConfig.background_color,
                set: (value) => {
                  config.background_color = value;
                  window.elementSdk.setConfig({ background_color: value });
                }
              },
              {
                get: () => config.text_color || defaultConfig.text_color,
                set: (value) => {
                  config.text_color = value;
                  window.elementSdk.setConfig({ text_color: value });
                }
              },
              {
                get: () => config.surface_color || defaultConfig.surface_color,
                set: (value) => {
                  config.surface_color = value;
                  window.elementSdk.setConfig({ surface_color: value });
                }
              }
            ],
            borderables: [],
            fontEditable: undefined,
            fontSizeable: undefined
          }),
          mapToEditPanelValues: (config) => new Map([
            ["app_title", config.app_title || defaultConfig.app_title],
            ["school_name", config.school_name || defaultConfig.school_name]
          ])
        });
      }

      renderLoginPage();
      
      // Auto-refresh data dari spreadsheet setiap 30 detik (tanpa notifikasi)
      setInterval(async () => {
        if (currentUser) {
          await loadLayananFromCSV(false);
          await loadMCUFromCSV(false);
          await loadRujukanFromCSV(false);
          
          // Update tampilan sesuai menu aktif
          if (currentMenu === 'layanan') {
            displayRecords();
          } else if (currentMenu === 'mcu') {
            displayStudents();
          } else if (currentMenu === 'rujukan') {
            displayRujukanHistory();
          } else if (currentMenu === 'laporan') {
            displayStatistics();
          }
        }
      }, 30000); // 30 detik
    }

    init();
  </script>
